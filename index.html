<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Day Plan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script>
// Recharts UMD is unreliable on CDN — stub out with no-op components so the dashboard renders without charts.
window.Recharts = new Proxy({}, { get: () => (props) => React.createElement("div", { style: { display: "none" } }, props && props.children) });
</script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>html,body{background:#030712;}</style>
</head>
<body>
<div id="err" style="color:#fca5a5;background:#1f2937;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;display:none;"></div>
<script>
window.addEventListener("error", (e) => {
  const el = document.getElementById("err");
  el.style.display = "block";
  el.textContent += "[error] " + (e.message || e.error) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + "\n";
});
window.addEventListener("unhandledrejection", (e) => {
  const el = document.getElementById("err");
  el.style.display = "block";
  el.textContent += "[promise] " + (e.reason && (e.reason.message||e.reason)) + "\n";
});
</script>
<div id="root"><div style="color:#9ca3af;font-family:system-ui;padding:24px;">Loading dashboard…</div></div>
<script>
(async () => {
  try {
    const resp = await fetch("./data.json?t=" + Date.now(), { cache: "no-store" });
    if (!resp.ok) throw new Error("data.json HTTP " + resp.status);
    window.PLAN_DATA = await resp.json();
  } catch (e) {
    const el = document.getElementById("err");
    el.style.display = "block";
    el.textContent += "[data load] " + (e && (e.message || e)) + "\n";
    window.PLAN_DATA = { roles: [], totals: { roles_with_work: 0, grand_total: 0 } };
  }
  const jsx = document.getElementById("jsx-src");
  jsx.setAttribute("type", "text/babel");
  if (window.Babel && typeof window.Babel.transformScriptTags === "function") {
    window.Babel.transformScriptTags();
  } else {
    setTimeout(() => window.Babel && window.Babel.transformScriptTags && window.Babel.transformScriptTags(), 50);
  }
})();
</script>
<script id="jsx-src" type="text/plain" data-presets="env,react">
const { useState, useMemo } = React;

const PLAN_DATA = window.PLAN_DATA;

const SOURCES = {
  granola: { label: "Granola", color: "#8B5CF6", icon: "🎙️" },
  calendar: { label: "Calendar", color: "#3B82F6", icon: "📅" },
  linear: { label: "Linear", color: "#10B981", icon: "🔷" },
  zendesk: { label: "Zendesk", color: "#F59E0B", icon: "🎫" },
  email: { label: "Email", color: "#EF4444", icon: "✉️" },
  slack: { label: "Slack", color: "#4A154B", icon: "💬" },
};

const ROLES = {
  "pm-support":    { label: "PM + Support", color: "#3B82F6", icon: "🛠️" },
  "ceo":           { label: "CEO",          color: "#8B5CF6", icon: "🧭" },
  "bd-europe":     { label: "BD Europe",    color: "#10B981", icon: "🇪🇺" },
  "bd-us-g4k":     { label: "BD US / G4K",  color: "#F59E0B", icon: "🇺🇸" },
  "cfo":           { label: "CFO",          color: "#EC4899", icon: "💰" },
  "self-mgmt":     { label: "Self-Mgmt",    color: "#6366F1", icon: "⚙️" },
  "personal-life": { label: "Personal",     color: "#9CA3AF", icon: "🏠" },
};

function roleLabel(role) {
  const meta = ROLES[role];
  if (meta) return meta.label;
  return role.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
}

function timeAgo(isoString) {
  if (!isoString) return "";
  const d = new Date(isoString);
  const now = Date.now();
  const msSince = now - d.getTime();
  const minSince = Math.floor(msSince / (1000 * 60));
  const hrSince = Math.floor(minSince / 60);
  const daySince = Math.floor(hrSince / 24);
  if (minSince < 60) return `${minSince}m`;
  if (hrSince < 24) return `${hrSince}h`;
  return `${daySince}d`;
}

function PlanDashboard() {
  const [expandedRole, setExpandedRole] = useState(null);

  const roles = useMemo(() => PLAN_DATA.roles || [], []);
  const totals = useMemo(() => PLAN_DATA.totals || { grand_total: 0, roles_with_work: 0 }, []);

  const showEmptyState = totals.grand_total === 0;

  return (
    <div className="min-h-screen bg-gray-950 text-gray-100 p-6">
      <div className="mb-8">
        <h1 className="text-3xl font-bold text-white mb-2">Day Plan</h1>
        <p className="text-gray-400">
          {totals.grand_total} items across {totals.roles_with_work} role{totals.roles_with_work !== 1 ? "s" : ""}
        </p>
        <p className="text-xs text-gray-500 mt-2">
          Generated {PLAN_DATA.generated_at ? new Date(PLAN_DATA.generated_at).toLocaleString() : ""}
        </p>
      </div>

      {showEmptyState ? (
        <div className="text-center py-16 text-gray-400">
          <p className="text-lg mb-2">Nothing on your plate right now.</p>
          <p className="text-sm">Go do a triage when new items come in. 📱</p>
        </div>
      ) : (
        <div className="space-y-6">
          {roles.map((role) => {
            const meta = ROLES[role.role] || { label: roleLabel(role.role), color: "#9CA3AF", icon: "📋" };
            const isExpanded = expandedRole === role.role;
            return (
              <div key={role.role} className="bg-gray-900 rounded-lg overflow-hidden border border-gray-800">
                <button
                  onClick={() => setExpandedRole(isExpanded ? null : role.role)}
                  className="w-full px-6 py-4 text-left hover:bg-gray-800 transition-colors flex items-center justify-between"
                >
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">{meta.icon}</span>
                    <div>
                      <div className="font-semibold text-white" style={{ color: meta.color }}>{meta.label}</div>
                      <div className="text-xs text-gray-400 mt-0.5">
                        {role.queue_count > 0 && `${role.queue_count} queued`}
                        {role.queue_count > 0 && role.active_count > 0 && " · "}
                        {role.active_count > 0 && `${role.active_count} in progress`}
                      </div>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-2xl font-bold text-white">{role.total}</div>
                    <div className="text-xs text-gray-500">items</div>
                  </div>
                </button>

                {isExpanded && (
                  <div className="border-t border-gray-800 bg-gray-950 px-6 py-4 space-y-4">
                    {role.queue_count > 0 && (
                      <div>
                        <h4 className="text-sm font-medium text-gray-300 mb-3">Queue</h4>
                        <div className="space-y-2">
                          {role.queue.map((item, idx) => (
                            <div key={idx} className="bg-gray-900 rounded p-3 text-sm border-l-2"
                                 style={{ borderColor: SOURCES[item.source]?.color || "#6B7280" }}>
                              <div className="font-medium text-gray-100">{item.title}</div>
                              <div className="text-xs text-gray-500 mt-1 flex items-center gap-2">
                                <span>{SOURCES[item.source]?.icon || "📋"} {item.source}</span>
                                {item.routed_at && <span className="text-gray-600">·</span>}
                                {item.routed_at && <span>{timeAgo(item.routed_at)} ago</span>}
                              </div>
                              {item.summary_hint && (
                                <div className="text-xs text-gray-400 mt-2 italic">{item.summary_hint}</div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {role.active_count > 0 && (
                      <div>
                        <h4 className="text-sm font-medium text-gray-300 mb-3">In Progress</h4>
                        <div className="space-y-2">
                          {role.active.map((issue, idx) => (
                            <div key={idx} className="bg-gray-900 rounded p-3 text-sm border-l-2 border-green-600">
                              <div className="font-medium text-gray-100">{issue.title}</div>
                              {issue.status_summary && (
                                <div className="text-xs text-green-400 mt-1">{issue.status_summary}</div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div className="mt-12 pt-6 border-t border-gray-800 text-center text-xs text-gray-500">
        <p>This is a post-triage overview. Open a role project to start working. 📱</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PlanDashboard />);
</script>
</body>
</html>
