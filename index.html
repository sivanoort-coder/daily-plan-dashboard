    const prioRaw = hints.priority;
    const prio = typeof prioRaw === "string" ? prioRaw.toLowerCase() : "";
    if (hints.overdue === true) overdue++;
    if (prio === "urgent" || prio === "high" || hints.potential_issue === true || i.inbox_status === "updated") high++;
    if (i.timestamp) {
      const ageDays = (now - new Date(i.timestamp).getTime()) / (1000*60*60*24);
      if (ageDays > 7) stale++;
    }
  }
  const score = overdue*3 + high*2 + stale;
  const signal = score >= PRESSURE_RED ? "🔴" : score >= PRESSURE_YELLOW ? "🟡" : "🟢";
  return { score, signal, overdue, high, stale };
}

function daysAgo(timestamp) {
  if (!timestamp) return null;
  const diff = Date.now() - new Date(timestamp).getTime();
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  if (days === 0) return "Today";
  if (days === 1) return "Yesterday";
  return `${days}d ago`;
}

function formatTime(timestamp, tz) {
  if (!timestamp) return "";
  return new Date(timestamp).toLocaleString("en-GB", {
    weekday: "short", day: "numeric", month: "short",
    hour: "2-digit", minute: "2-digit",
    timeZone: tz || "Europe/Amsterdam",
  });
}

function TriageDashboard() {
  const [selectedSource, setSelectedSource] = useState("all");
  const [selectedRole, setSelectedRole] = useState("all");
  const [selectedStatus, setSelectedStatus] = useState("actionable");
  const [expandedItem, setExpandedItem] = useState(null);

  const allItems = useMemo(() => {
    const items = [];
    for (const [source, data] of Object.entries(INBOX_DATA)) {
      for (const item of data.items || []) {
        items.push({ ...item, _source: source });
      }
    }
    return items.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  }, []);

  const actionable = useMemo(
    () => allItems.filter((i) => i.inbox_status === "untriaged" || i.inbox_status === "updated"),
    [allItems]
  );

  const filteredItems = useMemo(() => {
    let items = allItems;
    if (selectedSource !== "all") items = items.filter((i) => i._source === selectedSource);
    if (selectedRole !== "all") items = items.filter((i) => (i.suggested_role || "unknown") === selectedRole);
    if (selectedStatus === "actionable") {
      items = items.filter((i) => i.inbox_status === "untriaged" || i.inbox_status === "updated");
    } else if (selectedStatus !== "all") {
      items = items.filter((i) => i.inbox_status === selectedStatus);
    }
    return items;
  }, [allItems, selectedSource, selectedRole, selectedStatus]);

  const actionableCount = actionable.length;
  const triagedCount = allItems.filter((i) => i.inbox_status === "triaged").length;
  const snoozedCount = allItems.filter((i) => i.inbox_status === "snoozed").length;

  // By-role pivot — roles in fixed order, only render roles with any actionable items
  const roleBreakdown = useMemo(() => {
    const byRole = {};
    for (const i of actionable) {
      const r = i.suggested_role || "unknown";
      if (!byRole[r]) byRole[r] = []; byRole[r].push(i);
    }
    const rows = [];
    for (const r of ROLE_ORDER) {
      const items = byRole[r] || [];
      if (!items.length) continue;
      rows.push({ role: r, items, count: items.length, pressure: pressureFor(items) });
    }
    // Unknown/other roles at the tail
    for (const [r, items] of Object.entries(byRole)) {
      if (ROLE_ORDER.includes(r)) continue;
      rows.push({ role: r, items, count: items.length, pressure: pressureFor(items) });
    }
    return rows;
  }, [actionable]);

  const overallPressure = useMemo(() => pressureFor(actionable), [actionable]);

  // Source breakdown for pie
  const sourceData = Object.entries(SOURCES).map(([key, { label, color }]) => ({
    name: label,
    value: actionable.filter((i) => i._source === key).length,
    color,
  })).filter((d) => d.value > 0);

  // Role bar (kept as a chart for at-a-glance)
  const roleData = roleBreakdown.map((r) => ({
    role: ROLES[r.role]?.label || r.role,
    count: r.count,
    fill: ROLES[r.role]?.color || "#9CA3AF",
  }));

  // Age breakdown
  const ageGroups = { today: 0, yesterday: 0, thisWeek: 0, older: 0 };
  actionable.forEach((i) => {
    const diff = (Date.now() - new Date(i.timestamp).getTime()) / (1000 * 60 * 60 * 24);
    if (diff < 1) ageGroups.today++;
    else if (diff < 2) ageGroups.yesterday++;
    else if (diff < 7) ageGroups.thisWeek++;
    else ageGroups.older++;
  });

  return (
    <div className="min-h-screen bg-gray-950 text-gray-100 p-6">
      {/* Header */}
      <div className="mb-6 flex items-baseline justify-between">
        <div>
          <h1 className="text-2xl font-bold text-white mb-1">Day Plan</h1>
          <p className="text-gray-400 text-sm">
            {actionableCount} items need attention · {triagedCount} triaged · {snoozedCount} snoozed
          </p>
        </div>
        <div className="text-sm text-gray-300">
          Overall pressure <span className="text-xl ml-1">{overallPressure.signal}</span>
          <span className="text-gray-500 text-xs ml-2">(score {overallPressure.score})</span>
        </div>
      </div>

      {/* By-source stat cards */}
      <div className="grid grid-cols-6 gap-3 mb-6">
        {Object.entries(SOURCES).map(([key, { label, color, icon }]) => {
          const count = actionable.filter((i) => i._source === key).length;
          const total = allItems.filter((i) => i._source === key).length;
          const selected = selectedSource === key;
          return (
            <button
              key={key}
              onClick={() => setSelectedSource(selected ? "all" : key)}
              className={`rounded-lg p-4 text-left transition-all ${
                selected ? "ring-2 ring-offset-2 ring-offset-gray-950" : "hover:bg-gray-800"
              } bg-gray-900`}
              style={selected ? { boxShadow: `0 0 0 2px ${color}` } : {}}
            >
              <div className="text-2xl mb-1">{icon}</div>
              <div className="text-sm text-gray-400">{label}</div>
              <div className="text-xl font-bold" style={{ color }}>{count}</div>
              <div className="text-xs text-gray-500">{total} total</div>
            </button>
          );
        })}
      </div>

      {/* By-role pivot panel (ME-168) */}
      <div className="bg-gray-900 rounded-lg p-4 mb-6">
        <div className="flex items-baseline justify-between mb-3">
          <h3 className="text-sm font-medium text-gray-300">By Role · pressure = (overdue × 3) + (high × 2) + (stale × 1)</h3>
          {selectedRole !== "all" && (
            <button
              onClick={() => setSelectedRole("all")}
              className="text-xs text-blue-400 hover:text-blue-300"
            >
              Clear role filter
            </button>
          )}
        </div>
        {roleBreakdown.length === 0 ? (
          <div className="text-gray-500 text-sm">No actionable items across any role. ✅</div>
        ) : (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
            {roleBreakdown.map(({ role, count, pressure }) => {
              const meta = ROLES[role] || { label: role, color: "#9CA3AF", icon: "📋" };
              const selected = selectedRole === role;
              return (
                <button
                  key={role}
                  onClick={() => setSelectedRole(selected ? "all" : role)}
                  className={`rounded-md p-3 text-left transition-colors bg-gray-800 hover:bg-gray-700 ${
                    selected ? "ring-2" : ""
                  }`}
                  style={selected ? { boxShadow: `0 0 0 2px ${meta.color}` } : {}}
                  title={`overdue ${pressure.overdue} · high ${pressure.high} · stale ${pressure.stale}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">{meta.icon}</span>
                      <span className="text-sm font-medium" style={{ color: meta.color }}>{meta.label}</span>
                    </div>
                    <span className="text-lg">{pressure.signal}</span>
                  </div>
                  <div className="flex items-baseline justify-between">
                    <span className="text-xl font-bold text-gray-100">{count}</span>
                    <span className="text-xs text-gray-500">
                      {pressure.overdue > 0 && <span className="text-red-400 mr-1">⏰{pressure.overdue}</span>}
                      {pressure.high > 0 && <span className="text-orange-400 mr-1">⚡{pressure.high}</span>}
                      {pressure.stale > 0 && <span className="text-gray-400">🕸{pressure.stale}</span>}
                    </span>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* Charts row */}
      <div className="grid grid-cols-3 gap-4 mb-6">
        <div className="bg-gray-900 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-400 mb-2">By Source</h3>
          <ResponsiveContainer width="100%" height={160}>
            <PieChart>
              <Pie data={sourceData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={60} innerRadius={30}>
                {sourceData.map((entry, i) => (<Cell key={i} fill={entry.color} />))}
              </Pie>
              <Tooltip contentStyle={{ backgroundColor: "#1F2937", border: "none", borderRadius: "8px" }} itemStyle={{ color: "#F3F4F6" }}/>
            </PieChart>
          </ResponsiveContainer>
        </div>

        <div className="bg-gray-900 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-400 mb-2">By Role</h3>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={roleData} layout="vertical">
              <XAxis type="number" hide />
              <YAxis type="category" dataKey="role" width={100} tick={{ fill: "#9CA3AF", fontSize: 11 }} />
              <Bar dataKey="count" radius={[0, 4, 4, 0]}>
                {roleData.map((entry, i) => (<Cell key={i} fill={entry.fill} />))}
              </Bar>
              <Tooltip contentStyle={{ backgroundColor: "#1F2937", border: "none", borderRadius: "8px" }} itemStyle={{ color: "#F3F4F6" }}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div className="bg-gray-900 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-400 mb-3">Age of Actionable</h3>
          <div className="space-y-3">
            {[
              { label: "Today", count: ageGroups.today, color: "#10B981" },
              { label: "Yesterday", count: ageGroups.yesterday, color: "#3B82F6" },
              { label: "This week", count: ageGroups.thisWeek, color: "#F59E0B" },
              { label: "Older", count: ageGroups.older, color: "#EF4444" },
            ].map(({ label, count, color }) => (
              <div key={label} className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full" style={{ backgroundColor: color }} />
                  <span className="text-sm text-gray-300">{label}</span>
                </div>
                <span className="text-sm font-medium" style={{ color }}>{count}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Filter bar */}
      <div className="flex gap-2 mb-4 flex-wrap items-center">
        {[
          { key: "actionable", label: `Actionable (${actionableCount})` },
          { key: "snoozed", label: `Snoozed (${snoozedCount})` },
          { key: "triaged", label: `Triaged (${triagedCount})` },
          { key: "all", label: `All (${allItems.length})` },
        ].map(({ key, label }) => (
          <button
            key={key}
            onClick={() => setSelectedStatus(key)}
            className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${
              selectedStatus === key ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400 hover:text-gray-200"
            }`}
          >
            {label}
          </button>
        ))}
        {(selectedSource !== "all" || selectedRole !== "all") && (
          <span className="text-xs text-gray-500 ml-2">
            filter:{selectedSource !== "all" && ` source=${selectedSource}`}{selectedRole !== "all" && ` role=${selectedRole}`}
          </span>
        )}
      </div>

      {/* Item list */}
      <div className="space-y-1">
        {filteredItems.length === 0 && (
          <div className="text-center py-12 text-gray-500">
            {selectedStatus === "actionable" ? "All caught up! Nothing to triage here." : "No items match this filter."}
          </div>
        )}
        {filteredItems.map((item) => {
          const src = SOURCES[item._source] || { label: item._source, color: "#6B7280", icon: "📋" };
          const isExpanded = expandedItem === item.id;
          const roleMeta = ROLES[item.suggested_role];
          return (
            <div key={item.id + item._source + item.timestamp}>
              <button
                onClick={() => setExpandedItem(isExpanded ? null : item.id)}
                className="w-full text-left px-4 py-3 rounded-lg bg-gray-900 hover:bg-gray-800 transition-colors flex items-center gap-3"
              >
                <span className="text-lg flex-shrink-0">{src.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-200 truncate">{item.title}</div>
                  <div className="text-xs text-gray-500 flex gap-3 mt-0.5 flex-wrap">
                    <span>{item.relative_label || daysAgo(item.timestamp)}</span>
                    <span className="text-gray-600">·</span>
                    <span>{formatTime(item.timestamp)}</span>
                    {roleMeta && (
                      <span className="px-1.5 rounded"
                            style={{ backgroundColor: roleMeta.color + "20", color: roleMeta.color }}>
                        {roleMeta.icon} {roleMeta.label}
                      </span>
                    )}
                    {item.suggested_classification && (
                      <span className="text-gray-500">{item.suggested_classification}</span>
                    )}
                  </div>
                </div>
                <div className="px-2 py-0.5 rounded text-xs font-medium flex-shrink-0"
                     style={{ backgroundColor: (STATUS_COLORS[item.inbox_status] || "#6B7280") + "20",
                              color: STATUS_COLORS[item.inbox_status] || "#9CA3AF" }}>
                  {item.inbox_status}
                </div>
              </button>
              {isExpanded && (
                <div className="ml-12 px-4 py-3 text-xs text-gray-400 bg-gray-900 rounded-b-lg -mt-1 border-t border-gray-800">
                  <div className="grid grid-cols-2 gap-2">
                    <div>ID: <span className="text-gray-300">{item.id}</span></div>
                    <div>Source: <span className="text-gray-300">{item._source}</span></div>
                    <div>Classification: <span className="text-gray-300">{item.suggested_classification || "—"}</span></div>
                    <div>Role: <span className="text-gray-300">{item.suggested_role || "—"}</span></div>
                    {item.source_url && (
                      <div className="col-span-2">URL: <span className="text-blue-400 break-all">{item.source_url}</span></div>
                    )}
                    {item.source_data && (
                      <div className="col-span-2 mt-1">
                        <pre className="bg-gray-800 p-2 rounded text-gray-300 overflow-x-auto">
                          {JSON.stringify(item.source_data, null, 2)}
                        </pre>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="mt-8 text-xs text-gray-600 text-center">
        This is an overview, not a work surface. Open the role project you want to work in to take action.
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<TriageDashboard />);
</script>
</body>
</html>
